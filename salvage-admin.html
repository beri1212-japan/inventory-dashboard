<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廃車見積もり管理 - INDIO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:13px;color:#1a2332}
.hdr{background:#1e3a5f;padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-title{font-size:14px;font-weight:700;color:#fff}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-count{font-size:11px;color:rgba(255,255,255,.6)}
.btn-add{background:#dc2626;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
.main{max-width:1200px;margin:0 auto;padding:12px 16px}
.card{background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.card-hdr{padding:10px 14px;border-bottom:1px solid #f0f4f8;display:flex;justify-content:space-between;align-items:center}
.car-name{font-size:14px;font-weight:700}
.car-sub{font-size:11px;color:#4a6070;margin-top:1px}
.status-badge{font-size:10px;font-weight:600;padding:2px 10px;border-radius:10px;white-space:nowrap}
.s-unnotified{background:#fee2e2;color:#dc2626}
.s-notified{background:#fef3c7;color:#d97706}
.s-answered{background:#dcfce7;color:#16a34a}
.s-transferred{background:#e8f0fb;color:#2979d4}
.card-body{padding:10px 14px}
/* 見積もり表示 */
.estimates{margin-bottom:10px}
.est-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:6px;margin-bottom:4px}
.est-row.best{background:#dcfce7;border:1px solid #86efac}
.est-row.normal{background:#f7f9fc}
.est-row.pending{background:#fff;border:1px dashed #d8e2ec}
.est-vendor{font-size:12px;font-weight:500}
.est-amount{font-size:14px;font-weight:700}
.est-best{font-size:11px;color:#16a34a}
.est-pending{font-size:11px;color:#8a9aaa}
/* 業者選択 */
.vendor-select{background:#f7f9fc;border-radius:8px;padding:10px 12px;margin-bottom:8px}
.vendor-select-title{font-size:11px;font-weight:600;color:#4a6070;margin-bottom:8px}
.radio-group{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.radio-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;border:0.5px solid #d8e2ec;background:#fff;transition:all .15s}
.radio-item.selected{background:#dbeafe;border-color:#2979d4}
.radio-item input{accent-color:#2979d4;width:14px;height:14px;cursor:pointer}
.radio-item label{font-size:12px;cursor:pointer;flex:1}
.check-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;border:0.5px solid #d8e2ec;background:#fff;transition:all .15s}
.check-item.selected{background:#dbeafe;border-color:#2979d4}
.check-item input{accent-color:#2979d4;width:14px;height:14px;cursor:pointer}
.check-item label{font-size:12px;cursor:pointer;flex:1}
.btn-notify{width:100%;background:#059669;color:#fff;border:none;padding:8px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500}
.btn-notify:hover{opacity:.9}
/* アクションボタン */
.btn-row{display:flex;gap:6px}
.btn-transfer{flex:1;background:#2979d4;color:#fff;border:none;padding:7px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500}
.btn-detail{flex:1;background:#f0f4f8;color:#4a6070;border:0.5px solid #d8e2ec;padding:7px;border-radius:7px;cursor:pointer;font-size:11px}
.btn-order{flex:1;background:#d97706;color:#fff;border:none;padding:7px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:500}
.btn-order:hover{opacity:.9}
/* 写真モーダル */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;padding:16px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto;z-index:100}
.modal.show,.modal-ov.show{display:block}
.modal-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between}
.modal-close{cursor:pointer;color:#8a9aaa;font-size:20px;line-height:1}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;cursor:pointer}
.photo-placeholder{width:100%;aspect-ratio:4/3;background:#f0f4f8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#d8e2ec}
.photo-lbl{font-size:10px;color:#4a6070;margin-bottom:3px;text-align:center}
/* 写真拡大 */
.photo-zoom{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:110;align-items:center;justify-content:center}
.photo-zoom.show{display:flex}
.photo-zoom img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:6px}
.photo-zoom-close{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer}
.empty{text-align:center;padding:40px;color:#8a9aaa}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2332;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;display:none;white-space:nowrap}

/* PC テーブルビュー */
.tbl-view{display:none}
.tbl-view table{width:100%;border-collapse:collapse;font-size:12px}
.tbl-view thead th{background:#1e3a5f;color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1)}
.tbl-view tbody tr{border-bottom:1px solid #e8f0f8;transition:background .1s}
.tbl-view tbody tr:hover{background:#f0f7ff}
.tbl-view td{padding:8px 10px;vertical-align:middle;border-right:1px solid #e8f0f8}
.tbl-view td:first-child{font-weight:500}
.est-cell{display:flex;flex-direction:column;gap:2px}
.est-row-tbl{display:flex;justify-content:space-between;align-items:center;padding:2px 6px;border-radius:4px;font-size:11px}
.est-row-tbl.best{background:#dcfce7;color:#16a34a;font-weight:600}
.est-row-tbl.normal{color:#4a6070}
.est-row-tbl.pending{color:#d97706}
.vendor-tbl{display:flex;flex-direction:column;gap:3px}
.check-tbl{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:11px;border:0.5px solid #d8e2ec;background:#fff}
.check-tbl.selected{background:#dbeafe;border-color:#2979d4;color:#1d4ed8}
.check-tbl input{accent-color:#2979d4;width:12px;height:12px}
.btn-notify-sm{background:#059669;color:#fff;border:none;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:500;margin-top:3px;width:100%}
.btn-transfer-sm{background:#2979d4;color:#fff;border:none;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:500;width:100%}
.btn-order-sm{background:#d97706;color:#fff;border:none;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:500;width:100%;margin-top:3px}
.btn-detail-sm{background:#f0f4f8;color:#4a6070;border:0.5px solid #d8e2ec;padding:4px 8px;border-radius:5px;cursor:pointer;font-size:10px;width:100%;margin-top:3px}
@media(min-width:768px){
  .tbl-view{display:block}
  .card-view{display:none}
}
.toast.show{display:block}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:4px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:16px}
.stats-card{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stats-name{font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #e8f0f8}
.stats-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px;border-bottom:0.5px solid #f0f4f8}
.stats-row:last-child{border-bottom:none}
.stats-lbl{color:#4a6070}
.stats-val{font-weight:600;font-family:monospace}
.stats-val.green{color:#16a34a}
.stats-val.blue{color:#2979d4}
.stats-val.amber{color:#d97706}
.rate-bar{height:6px;background:#f0f4f8;border-radius:3px;overflow:hidden;margin-top:4px}
.rate-fill{height:100%;background:#16a34a;border-radius:3px;transition:width .3s}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">廃車見積もり管理</div>
  <div class="hdr-right">
    <div style="display:flex;gap:4px;margin-right:8px">
      <button id="tab-list" onclick="switchTab('list')" style="background:rgba(255,255,255,.3);color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600">案件一覧</button>
      <button id="tab-stats" onclick="switchTab('stats')" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px">業者実績</button>
    </div>
    <span class="hdr-count" id="vehicleCount">—件</span>
    <button class="btn-add" onclick="location.href='salvage-input.html'">＋ 新規登録</button>
    <button style="background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px" onclick="loadData()">🔄 更新</button>
  </div>
</div>

<div class="main">
  <!-- PC: テーブルビュー -->
  <div class="tbl-view" id="tblContent"></div>
  <!-- スマホ: カードビュー -->
  <div class="card-view" id="mainContent">
  <div class="empty">読み込み中...</div>
</div>

  </div><!-- /card-view -->

  <!-- 業者実績パネル -->
  <div id="statsPanel" style="display:none">
    <div id="statsContent"></div>
  </div>
</div><!-- /main -->

<!-- 写真モーダル -->
<div class="modal-ov" id="modalOv" onclick="closeModal()"></div>
<div class="modal" id="photoModal">
  <div class="modal-title">
    <span id="modalTitle">車両写真</span>
    <span class="modal-close" onclick="closeModal()">×</span>
  </div>
  <div class="photo-grid" id="modalPhotos"></div>
</div>

<!-- 写真拡大 -->
<div class="photo-zoom" id="photoZoom" onclick="closeZoom()">
  <span class="photo-zoom-close">×</span>
  <img id="zoomImg" src="">
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz1F9RX3jy6JyDNYwdDT3AZnGmMqZNSp2wMsLw9MTezePvnzaCB-J2U-gmDcDi38FOhUg/exec';
let VEHICLES  = [];
let VENDORS   = [];

function switchTab(tab) {
  const isStats = tab === 'stats';
  document.getElementById('tab-list').style.background  = isStats ? 'rgba(255,255,255,.1)' : 'rgba(255,255,255,.3)';
  document.getElementById('tab-stats').style.background = isStats ? 'rgba(255,255,255,.3)' : 'rgba(255,255,255,.1)';
  document.getElementById('tab-list').style.color  = isStats ? 'rgba(255,255,255,.7)' : '#fff';
  document.getElementById('tab-stats').style.color = isStats ? '#fff' : 'rgba(255,255,255,.7)';
  document.getElementById('tblContent').style.display   = isStats ? 'none' : '';
  document.getElementById('mainContent').style.display  = isStats ? 'none' : '';
  document.getElementById('statsPanel').style.display   = isStats ? 'block' : 'none';
  if (isStats) renderStats();
}

function renderStats() {
  if (!VEHICLES.length || !VENDORS.length) {
    document.getElementById('statsContent').innerHTML = '<div class="empty">データがありません</div>';
    return;
  }

  const cards = VENDORS.map(vd => {
    const name     = vd.name;
    // この業者に通知した案件
    const notified = VEHICLES.filter(v => (v.status||'').includes(name) || v.estimates?.some(e=>e.vendor===name));
    const answered = notified.filter(v => v.estimates?.some(e=>e.vendor===name && e.amount>0));
    const won      = VEHICLES.filter(v => v.bestVendor === name && v.bestAmount > 0);
    const amounts  = answered.map(v => v.estimates.find(e=>e.vendor===name)?.amount || 0).filter(a=>a>0);
    const avg      = amounts.length ? Math.round(amounts.reduce((a,b)=>a+b,0)/amounts.length) : 0;
    const max      = amounts.length ? Math.max(...amounts) : 0;
    const min      = amounts.length ? Math.min(...amounts) : 0;
    const rate     = notified.length ? Math.round(answered.length/notified.length*100) : 0;

    return `<div class="stats-card">
      <div class="stats-name">🏢 ${name}</div>
      <div class="stats-row"><span class="stats-lbl">依頼数</span><span class="stats-val">${notified.length}件</span></div>
      <div class="stats-row"><span class="stats-lbl">回答数</span><span class="stats-val blue">${answered.length}件</span></div>
      <div class="stats-row"><span class="stats-lbl">回答率</span><span class="stats-val ${rate>=80?'green':rate>=50?'amber':''}">    ${rate}%</span></div>
      <div class="rate-bar"><div class="rate-fill" style="width:${rate}%"></div></div>
      <div class="stats-row" style="margin-top:6px"><span class="stats-lbl">落札数</span><span class="stats-val green">${won.length}件</span></div>
      <div class="stats-row"><span class="stats-lbl">平均金額</span><span class="stats-val">¥${avg.toLocaleString()}</span></div>
      <div class="stats-row"><span class="stats-lbl">最高額</span><span class="stats-val green">¥${max.toLocaleString()}</span></div>
      <div class="stats-row"><span class="stats-lbl">最低額</span><span class="stats-val amber">¥${min.toLocaleString()}</span></div>
    </div>`;
  }).join('');

  document.getElementById('statsContent').innerHTML = `
    <div style="font-size:11px;color:#4a6070;margin-bottom:10px">全${VEHICLES.length}件 / 業者${VENDORS.length}社の実績</div>
    <div class="stats-grid">${cards}</div>`;
}

async function loadData() {
  try {
    const [vRes, vendorRes] = await Promise.all([
      fetch(`${GAS_URL}?action=getVehicles`),
      fetch(`${GAS_URL}?action=getVendors`)
    ]);
    VEHICLES = await vRes.json();
    VENDORS  = await vendorRes.json();
    renderAll();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">読み込みエラー: ${e.message}</div>`;
  }
}

function renderAll() {
  document.getElementById('vehicleCount').textContent = VEHICLES.length + '件';
  if (!VEHICLES.length) {
    document.getElementById('mainContent').innerHTML = '<div class="empty">登録された車両がありません</div>';
    document.getElementById('tblContent').innerHTML = '<div class="empty" style="padding:20px">登録された車両がありません</div>';
    return;
  }
  const sorted = VEHICLES.sort((a,b) => b.id.localeCompare(a.id));
  document.getElementById('mainContent').innerHTML = sorted.map(v => renderCard(v)).join('');
  document.getElementById('tblContent').innerHTML = renderTable(sorted);
}

function renderTable(vehicles) {
  const rows = vehicles.map(v => {
    const si = getStatusInfo(v);
    const isTransferred = v.status === '移送済';
    const notifiedVendor = (v.status||'').replace('通知済（','').replace('）','');

    // 見積もりセル
    const estCells = VENDORS.map(vd => {
      const est = v.estimates.find(e => e.vendor === vd.name && e.amount > 0);
      const isBest = est && est.vendor === v.bestVendor;
      if (est) return `<div class="est-row-tbl ${isBest?'best':'normal'}">${vd.name}: ¥${Number(est.amount).toLocaleString()} ${isBest?'🏆':''}</div>`;
      const notified = (v.status||'').includes(vd.name);
      return `<div class="est-row-tbl pending">${vd.name}: ${notified?'通知済・未回答':'—'}</div>`;
    }).join('');

    // 業者選択セル
    const vendorChecks = !isTransferred ? VENDORS.map((vd,i) => `
      <div class="check-tbl ${(v.status||'').includes(vd.name)?'selected':''}" id="tri-${v.id}-${i}" onclick="toggleVendorTbl('${v.id}',${i})">
        <input type="checkbox" id="tr-${v.id}-${i}" value="${vd.name}" ${(v.status||'').includes(vd.name)?'checked':''}>
        <label for="tr-${v.id}-${i}">${vd.name}</label>
      </div>`).join('') + `<button class="btn-notify-sm" onclick="notifyVendors('${v.id}','tbl')">✉ 通知</button>` : '';

    // アクションセル
    const actions = isTransferred
      ? `<div style="font-size:10px;color:#2979d4;text-align:center">✅移送済</div>`
      : `${v.bestAmount>0?`<button class="btn-transfer-sm" onclick="transferVehicle('${v.id}')">在庫へ移送</button>`:``}
         ${v.bestAmount>0?`<button class="btn-order-sm" onclick="sendOrderNotice('${v.id}','${v.bestVendor}',${v.bestAmount})">✉ 発注通知</button>`:''}
         <button class="btn-detail-sm" onclick="showPhotos('${v.id}')">📷 写真</button>`;

    return `<tr>
      <td>
        <div style="font-weight:700;font-size:15px;color:#1a2332;margin-bottom:4px">${v.maker} ${v.carName}</div>
        <div style="font-size:12px;color:#1a2332;margin-bottom:3px">下4桁:${v.lower4||'—'} ／ ${Number(v.mileage).toLocaleString()}km</div>
        <div style="font-size:12px;color:#1a2332;margin-bottom:3px">${formatDateTime(v.createdAt)}</div>
        ${v.staff?`<div style="font-size:12px;color:#1a2332;margin-bottom:3px">👤 担当:${v.staff}</div>`:''}
        ${v.memo?`<div style="font-size:12px;color:#4a6070;background:#fff8e1;padding:4px 6px;border-radius:4px;margin-top:5px">📝 ${v.memo}</div>`:''}
      </td>
      <td><span class="status-badge ${si.cls}">${si.label}</span></td>
      <td><div class="est-cell">${estCells}</div></td>
      <td><div class="vendor-tbl">${vendorChecks}</div></td>
      <td><div style="display:flex;flex-direction:column;gap:3px;min-width:90px">${actions}</div></td>
    </tr>`;
  }).join('');

  return `<table>
    <thead>
      <tr>
        <th>車両情報</th>
        <th>状態</th>
        <th>見積もり状況</th>
        <th>業者選択・通知</th>
        <th>アクション</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleVendorTbl(vehicleId, idx) {
  const item = document.getElementById(`tri-${vehicleId}-${idx}`);
  const cb   = document.getElementById(`tr-${vehicleId}-${idx}`);
  if (!item || !cb) return;
  cb.checked = !cb.checked;
  item.classList.toggle('selected', cb.checked);
}

function getStatusInfo(v) {
  const s = v.status || '未通知';
  if (s === '移送済') return { label:'移送済', cls:'s-transferred' };
  if (v.estimates.some(e => e.amount > 0)) return { label:'回答済', cls:'s-answered' };
  if (s.startsWith('通知済')) return { label:s, cls:'s-notified' };
  return { label:'未通知', cls:'s-unnotified' };
}

function renderCard(v) {
  const si = getStatusInfo(v);
  const isTransferred = v.status === '移送済';

  // 見積もり表示
  const notifiedVendor = (v.status || '').replace('通知済（','').replace('）','');
  let estHtml = '';
  if (v.estimates.length > 0) {
    estHtml = `<div class="estimates">` +
      v.estimates.map(e => {
        const isBest = e.vendor === v.bestVendor && v.bestAmount > 0;
        return `<div class="est-row ${isBest ? 'best' : 'normal'}">
          <span class="est-vendor">${e.vendor} ${isBest ? '🏆' : ''}</span>
          <div style="text-align:right">
            <div class="est-amount ${isBest ? 'est-best' : ''}">¥${Number(e.amount).toLocaleString()}</div>
            ${e.comment ? `<div style="font-size:10px;color:#8a9aaa">${e.comment}</div>` : ''}
          </div>
        </div>`;
      }).join('') + `</div>`;
  }

  // 業者選択（未移送のみ）
  const vendorSelectHtml = !isTransferred ? `
    <div class="vendor-select">
      <div class="vendor-select-title">通知する業者を選択（1社のみ）</div>
      <div class="radio-group" id="rg-${v.id}">
        ${VENDORS.map((vd,i) => `
          <div class="check-item ${v.status?.includes(vd.name)?'selected':''}" id="ri-${v.id}-${i}" onclick="toggleVendor('${v.id}',${i})">
            <input type="checkbox" id="r-${v.id}-${i}" value="${vd.name}" ${v.status?.includes(vd.name)?'checked':''}>
            <label for="r-${v.id}-${i}">${vd.name}</label>
            ${v.estimates.find(e=>e.vendor===vd.name)
              ? `<span style="font-size:10px;color:#16a34a">回答済</span>`
              : v.status?.includes(vd.name) ? `<span style="font-size:10px;color:#d97706">通知済</span>` : ''}
          </div>`).join('')}
      </div>
      <button class="btn-notify" onclick="notifyVendors('${v.id}')">✉ 選択業者に一括Chatwork通知</button>
    </div>` : '';

  const actionHtml = !isTransferred
    ? `<div class="btn-row">
        ${v.bestAmount > 0 ? `
          <button class="btn-transfer" onclick="transferVehicle('${v.id}')">在庫管理表へ移送</button>
          <button class="btn-order" onclick="sendOrderNotice('${v.id}','${v.bestVendor}',${v.bestAmount})">✉ 発注通知</button>
        ` : ''}
        <button class="btn-detail" onclick="showPhotos('${v.id}')">写真・詳細</button>
       </div>`
    : `<div style="text-align:center;font-size:11px;color:#2979d4;padding:4px">✅ 在庫管理表へ移送済み</div>`;

  return `<div class="card">
    <div class="card-hdr">
      <div style="flex:1">
        <div class="car-name" style="font-size:16px;color:#1a2332;font-weight:700">${v.maker} ${v.carName}</div>
        <div style="font-size:13px;color:#1a2332;margin-top:3px">下4桁:${v.lower4||'—'} ／ ${Number(v.mileage).toLocaleString()}km</div>
        <div style="font-size:12px;color:#1a2332;margin-top:2px">${formatDateTime(v.createdAt)}</div>
        ${v.staff?`<div style="font-size:13px;color:#1a2332;margin-top:3px">👤 担当:${v.staff}</div>`:''}
        ${v.memo?`<div style="font-size:12px;color:#4a6070;background:#fff8e1;padding:5px 8px;border-radius:5px;margin-top:6px">📝 ${v.memo}</div>`:''}
      </div>
      <span class="status-badge ${si.cls}">${si.label}</span>
    </div>
    <div class="card-body">
      ${estHtml}
      ${vendorSelectHtml}
      ${actionHtml}
    </div>
  </div>`;
}

function toggleVendor(vehicleId, idx) {
  const item = document.getElementById(`ri-${vehicleId}-${idx}`);
  const cb   = document.getElementById(`r-${vehicleId}-${idx}`);
  cb.checked = !cb.checked;
  item.classList.toggle('selected', cb.checked);
}

async async function notifyVendors(vehicleId, mode) {
  let checked;
  if (mode === 'tbl') {
    checked = VENDORS.map((vd,i) => document.getElementById(`tr-${vehicleId}-${i}`))
      .filter(cb => cb && cb.checked).map(cb => cb.value);
  } else {
    const rg = document.getElementById(`rg-${vehicleId}`);
    checked  = Array.from(rg.querySelectorAll('input[type=checkbox]:checked')).map(c => c.value);
  }
  if (!checked.length) { showToast('業者を1社以上選択してください'); return; }
  if (!confirm(`「${checked.join('・')}」にChatworkで通知しますか？`)) return;

  showToast('通知中...');
  try {
    const res  = await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({ action:'notifyVendors', vehicleId, vendorNames: checked })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    showToast(`✅ ${checked.join('・')}に通知しました！`);
    setTimeout(loadData, 1500);
  } catch(e) {
    showToast('エラー: ' + e.message);
  }
}

async function transferVehicle(vehicleId) {
  if (!confirm('在庫管理表の未掲載シートへ移送しますか？')) return;
  showToast('移送中...');
  try {
    const res  = await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({ action:'transferToInventory', vehicleId })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    showToast(`✅ 移送完了！最高額: ${data.bestVendor} ¥${Number(data.bestAmount).toLocaleString()}`);
    setTimeout(loadData, 1500);
  } catch(e) {
    showToast('エラー: ' + e.message);
  }
}

function showPhotos(vehicleId) {
  const v = VEHICLES.find(x => x.id === vehicleId);
  if (!v) return;
  document.getElementById('modalTitle').textContent = `${v.maker} ${v.carName}`;
  const labels = { front:'前', rear:'後', interior:'室内', caution:'コーション', shakken:'車検証' };
  document.getElementById('modalPhotos').innerHTML = Object.entries(labels).map(([k,l]) => `
    <div>
      <div class="photo-lbl">${l}</div>
      ${v.photos[k]
        ? `<img class="photo-img" src="${v.photos[k]}" onclick="openZoom('${v.photos[k]}')" onerror="this.style.display='none'">`
        : `<div class="photo-placeholder">📷</div>`}
    </div>`).join('');
  document.getElementById('photoModal').classList.add('show');
  document.getElementById('modalOv').classList.add('show');
}

function closeModal() {
  document.getElementById('photoModal').classList.remove('show');
  document.getElementById('modalOv').classList.remove('show');
}

function openZoom(url) {
  document.getElementById('zoomImg').src = url;
  document.getElementById('photoZoom').classList.add('show');
}
function closeZoom() {
  document.getElementById('photoZoom').classList.remove('show');
}

async function sendOrderNotice(vehicleId, vendorName, amount) {
  if (!vendorName) { showToast('見積もり回答がありません'); return; }
  if (!confirm(`「${vendorName}」に発注通知を送りますか？\n金額: ¥${Number(amount).toLocaleString()}`)) return;

  showToast('送信中...');
  try {
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action:      'notifyVendor',
        vehicleId,
        vendorName,
        orderNotice: true,
        bestAmount:  amount
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    showToast(`✅ ${vendorName}に発注通知を送りました！`);
  } catch(e) {
    showToast('エラー: ' + e.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadData();

// 日時フォーマット（ISO → 2026-04-25 08:04）
function formatDateTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    const yyyy = d.getFullYear();
    const mm   = String(d.getMonth()+1).padStart(2,'0');
    const dd   = String(d.getDate()).padStart(2,'0');
    const hh   = String(d.getHours()).padStart(2,'0');
    const mi   = String(d.getMinutes()).padStart(2,'0');
    return `${yyyy}/${mm}/${dd} ${hh}:${mi}`;
  } catch(e) { return iso; }
}
