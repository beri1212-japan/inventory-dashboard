<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>廃車見積もり依頼</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:14px;color:#1a2332;min-height:100vh}
.hdr{background:#dc2626;padding:12px 16px;text-align:center;position:sticky;top:0;z-index:10}
.hdr-title{font-size:14px;font-weight:700;color:#fff}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px}
.wrap{max-width:400px;margin:0 auto;padding:12px}
.card{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sec-title{font-size:12px;font-weight:700;color:#1e3a5f;margin-bottom:10px;padding-left:8px;border-left:3px solid #dc2626}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.info-item{background:#f7f9fc;border-radius:7px;padding:7px 10px}
.info-lbl{font-size:9px;color:#8a9aaa;margin-bottom:2px}
.info-val{font-size:13px;font-weight:500;color:#1a2332}
.memo-box{background:#fff8e1;border-radius:7px;padding:8px 10px;font-size:12px;color:#92400e}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-item{cursor:pointer}
.photo-lbl{font-size:10px;color:#4a6070;text-align:center;margin-bottom:4px}
.photo-img{width:100%;aspect-ratio:4/3;border-radius:8px;object-fit:cover;border:0.5px solid #d8e2ec;background:#f0f4f8;display:flex;align-items:center;justify-content:center}
.photo-placeholder{width:100%;aspect-ratio:4/3;border-radius:8px;background:#f0f4f8;border:1px dashed #d8e2ec;display:flex;align-items:center;justify-content:center;font-size:22px;color:#d8e2ec}
.field{margin-bottom:12px}
.lbl{font-size:11px;color:#4a6070;margin-bottom:4px;font-weight:500}
.req{color:#dc2626;margin-left:2px}
.amount-wrap{display:flex;align-items:center;gap:8px}
.amount-wrap input{flex:1;padding:12px;border:1.5px solid #d8e2ec;border-radius:8px;font-size:18px;font-weight:500;color:#1a2332;text-align:right}
.amount-wrap input:focus{outline:none;border-color:#dc2626}
.amount-unit{font-size:14px;color:#4a6070;white-space:nowrap}
textarea{width:100%;padding:10px 12px;border:1px solid #d8e2ec;border-radius:8px;font-size:13px;color:#1a2332;font-family:inherit;resize:none}
textarea:focus{outline:none;border-color:#dc2626}
.deadline{background:#fef3c7;border:0.5px solid #fcd34d;border-radius:8px;padding:8px 12px;font-size:11px;color:#d97706;display:flex;align-items:center;gap:6px;margin-bottom:12px}
.btn-submit{width:100%;background:#dc2626;color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-submit:disabled{background:#9ca3af}
.note{font-size:11px;color:#8a9aaa;text-align:center;margin-top:8px}
.loading{text-align:center;padding:40px;color:#4a6070;font-size:14px}
.success-card{text-align:center;padding:32px 20px}
.success-icon{font-size:56px;margin-bottom:12px}
.success-title{font-size:17px;font-weight:700;color:#16a34a;margin-bottom:6px}
.success-sub{font-size:12px;color:#4a6070}
/* 写真モーダル */
.photo-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center}
.photo-modal.show{display:flex}
.photo-modal img{max-width:95vw;max-height:90vh;border-radius:8px;object-fit:contain}
.photo-modal-close{position:absolute;top:16px;right:16px;color:#fff;font-size:28px;cursor:pointer}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">廃車見積もり依頼</div>
  <div class="hdr-sub">株式会社INDIO</div>
</div>

<div class="wrap" id="mainWrap">
  <div class="loading" id="loading">読み込み中...</div>
</div>

<!-- 写真モーダル -->
<div class="photo-modal" id="photoModal" onclick="closePhotoModal()">
  <span class="photo-modal-close">×</span>
  <img id="modalImg" src="">
</div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbz1F9RX3jy6JyDNYwdDT3AZnGmMqZNSp2wMsLw9MTezePvnzaCB-J2U-gmDcDi38FOhUg/exec';
const params    = new URLSearchParams(location.search);
const vehicleId = params.get('id');
const vendorKey = params.get('vendor');
const VENDOR_MAP= { vendor_a:'業者A', vendor_b:'業者B', vendor_c:'業者C' };
const vendorName= VENDOR_MAP[vendorKey] || vendorKey;

async function init() {
  if (!vehicleId) { document.getElementById('mainWrap').innerHTML = '<div class="card"><p style="color:#dc2626;text-align:center">URLが無効です</p></div>'; return; }

  try {
    const res  = await fetch(`${GAS_URL}?action=getVehicle&id=${vehicleId}`);
    const data = await res.json();
    if (!data) throw new Error('車両が見つかりません');
    renderVehicle(data);
  } catch(e) {
    document.getElementById('mainWrap').innerHTML = `<div class="card"><p style="color:#dc2626;text-align:center">エラー: ${e.message}</p></div>`;
  }
}

function renderVehicle(v) {
  const wrap = document.getElementById('mainWrap');
  const photoHtml = ['front','rear','interior','caution'].map((t,i) => {
    const labels = ['前','後','室内','コーション'];
    const url = v.photos?.[t];
    return `<div class="photo-item" onclick="${url ? `openPhoto('${url}')` : ''}">
      <div class="photo-lbl">${labels[i]}</div>
      ${url
        ? `<img class="photo-img" src="${url}" onerror="this.style.display='none'">`
        : `<div class="photo-placeholder">📷</div>`}
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="card">
      <div class="sec-title">車両情報</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-lbl">メーカー</div><div class="info-val">${v.maker}</div></div>
        <div class="info-item"><div class="info-lbl">車種</div><div class="info-val">${v.carName}</div></div>
        <div class="info-item"><div class="info-lbl">走行距離</div><div class="info-val">${Number(v.mileage).toLocaleString()}km</div></div>
        <div class="info-item"><div class="info-lbl">車両ID</div><div class="info-val" style="font-size:11px;font-family:monospace">${v.id}</div></div>
      </div>
      ${v.memo ? `<div class="memo-box">${v.memo}</div>` : ''}
    </div>

    <div class="card">
      <div class="sec-title">車両写真（タップで拡大）</div>
      <div class="photo-grid">${photoHtml}</div>
    </div>

    <div class="card">
      <div class="sec-title">見積もり入力</div>
      <div class="field">
        <div class="lbl">見積もり金額<span class="req">*</span></div>
        <div class="amount-wrap">
          <input type="number" id="amount" placeholder="35000" inputmode="numeric">
          <span class="amount-unit">円</span>
        </div>
      </div>
      <div class="field">
        <div class="lbl">コメント（任意）</div>
        <textarea id="comment" rows="3" placeholder="パーツ状態・その他コメントなど"></textarea>
      </div>
      <div class="deadline">⏰ 回答期限: お早めにご回答ください</div>
      <button class="btn-submit" id="submitBtn" onclick="submitEstimate()">見積もりを送信する</button>
      <div class="note">送信後の変更はINDIOまでご連絡ください</div>
    </div>`;
}

function openPhoto(url) {
  document.getElementById('modalImg').src = url;
  document.getElementById('photoModal').classList.add('show');
}
function closePhotoModal() {
  document.getElementById('photoModal').classList.remove('show');
}

async function submitEstimate() {
  const amount = document.getElementById('amount').value;
  if (!amount || Number(amount) <= 0) { alert('金額を入力してください'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action:     'submitEstimate',
        vehicleId,
        vendorName,
        amount:     Number(amount),
        comment:    document.getElementById('comment').value,
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    document.getElementById('mainWrap').innerHTML = `
      <div class="card success-card">
        <div class="success-icon">✅</div>
        <div class="success-title">送信完了しました</div>
        <div class="success-sub">見積もり金額: ¥${Number(amount).toLocaleString()}<br>ご回答ありがとうございました</div>
      </div>`;
  } catch(e) {
    alert('エラー: ' + e.message);
    btn.disabled = false;
    btn.textContent = '見積もりを送信する';
  }
}

init();
</script>
</body>
</html>
